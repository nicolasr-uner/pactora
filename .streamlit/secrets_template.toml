# ════════════════════════════════════════════════════════════════════════════
#  secrets_template.toml — Plantilla de configuración para Pactora CLM
#
#  INSTRUCCIONES:
#  1. Copia este archivo como .streamlit/secrets.toml (nunca subas ese archivo a git).
#  2. Completa cada valor siguiendo las instrucciones de cada sección.
#  3. En Streamlit Community Cloud, pega el contenido en:
#     App settings → Secrets (editor de texto, formato TOML).
# ════════════════════════════════════════════════════════════════════════════


# ────────────────────────────────────────────────────────────────────────────
# SECCIÓN 1 — Autenticación OAuth con Google (Streamlit Native Auth)
#
# Pasos para obtener client_id y client_secret:
#   1. Ve a https://console.cloud.google.com/apis/credentials
#   2. Crea un proyecto (o usa el existente de tu Service Account).
#   3. "Crear credenciales" → "ID de cliente OAuth 2.0".
#   4. Tipo: "Aplicación web".
#   5. En "URIs de redireccionamiento autorizados" agrega EXACTAMENTE:
#      https://<tu-subdominio>.streamlit.app/oauth2callback
#      (reemplaza con tu URL real de Streamlit Cloud)
#   6. Descarga el JSON y copia client_id y client_secret aquí.
#   7. En "Pantalla de consentimiento OAuth" configura:
#      - Tipo: Interno (solo tu organización) o Externo (cualquier Gmail)
#      - Agrega tu dominio en "Dominios autorizados"
# ────────────────────────────────────────────────────────────────────────────

[auth]
redirect_uri  = "https://TU-APP.streamlit.app/oauth2callback"
cookie_secret = "REEMPLAZA_CON_STRING_ALEATORIO_32_CHARS"
# Genera cookie_secret con: python -c "import secrets; print(secrets.token_hex(32))"

[auth.google]
client_id     = "XXXXXXXXXX.apps.googleusercontent.com"
client_secret = "GOCSPX-XXXXXXXXXXXXXXXXXXXXXXXXXX"


# ────────────────────────────────────────────────────────────────────────────
# SECCIÓN 2 — Control de Acceso (Whitelist)
#
# admin_emails: Lista de correos que SIEMPRE tienen acceso admin,
#   incluso si la conexión a Drive falla. Úsalos como respaldo de emergencia.
#
# initial_allowed_emails: Correos de usuarios normales (viewers) que se
#   crean automáticamente al arrancar la app por primera vez.
#   Después de ese primer arranque, el admin puede gestionar la lista
#   desde el Panel de Administración en la app.
# ────────────────────────────────────────────────────────────────────────────

[auth_config]
admin_emails           = ["tu-correo@gmail.com", "otro-admin@unergy.co"]
initial_allowed_emails = ["colega1@unergy.co", "colega2@gmail.com"]


# ────────────────────────────────────────────────────────────────────────────
# SECCIÓN 3 — Google Drive
# ────────────────────────────────────────────────────────────────────────────

DRIVE_ROOT_FOLDER_ID = "ID_DE_TU_CARPETA_RAIZ_EN_DRIVE"
DRIVE_API_KEY        = "TU_API_KEY_PUBLICA_DE_GOOGLE"


# ────────────────────────────────────────────────────────────────────────────
# SECCIÓN 4 — Google Service Account
#
# Esta cuenta de servicio se usa para:
#   - Acceder a archivos privados en Google Drive
#   - Leer/escribir _pactora_auth_users.json (lista de usuarios)
#
# Para obtenerla:
#   1. Ve a https://console.cloud.google.com/iam-admin/serviceaccounts
#   2. Crea una cuenta de servicio o usa la existente.
#   3. "Claves" → "Agregar clave" → JSON.
#   4. Abre el JSON y copia cada campo aquí.
#   5. Comparte tu carpeta de Drive con el client_email de la SA.
# ────────────────────────────────────────────────────────────────────────────

[GOOGLE_SERVICE_ACCOUNT]
type                        = "service_account"
project_id                  = "tu-proyecto-gcp"
private_key_id              = "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
private_key                 = "-----BEGIN PRIVATE KEY-----\nTU_CLAVE_PRIVADA\n-----END PRIVATE KEY-----\n"
client_email                = "pactora-sa@tu-proyecto.iam.gserviceaccount.com"
client_id                   = "XXXXXXXXXXXXXXXXXX"
auth_uri                    = "https://accounts.google.com/o/oauth2/auth"
token_uri                   = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url        = "https://www.googleapis.com/robot/v1/metadata/x509/pactora-sa%40tu-proyecto.iam.gserviceaccount.com"


# ────────────────────────────────────────────────────────────────────────────
# SECCIÓN 5 — Gemini API
# ────────────────────────────────────────────────────────────────────────────

GEMINI_API_KEY = "TU_GEMINI_API_KEY"
